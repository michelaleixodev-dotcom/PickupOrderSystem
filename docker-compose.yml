services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=PickupOrderDb;Username=pickup_user;Password=pickup_pass123!
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-PickupOrderSystem}
      - Jwt__Audience=${JWT_AUDIENCE:-PickupOrderSystem}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: PickupOrderDb
      POSTGRES_USER: pickup_user
      POSTGRES_PASSWORD: pickup_pass123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickup_user -d PickupOrderDb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
